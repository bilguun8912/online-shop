<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

nav{
    width:100%;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    z-index:1000;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#00ffd5;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00ffd5;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:
    linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1523275335684-37898b6baf30');
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-size:80px;
    margin-bottom:20px;
    animation:fadeDown 1s ease;
}

.hero p{
    font-size:22px;
    color:#d0d0d0;
    animation:fadeUp 1s ease;
}

.hero button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:#00ffd5;
    color:black;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.hero button:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #00ffd5;
}

/* PRODUCTS */

.products{
    padding:100px 60px;
}

.products-title{
    text-align:center;
    font-size:50px;
    margin-bottom:60px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:35px;
}

.card{
    background:#161616;
    border-radius:25px;
    overflow:hidden;
    transition:0.4s;
    position:relative;
}

.card:hover{
    transform:translateY(-12px);
    box-shadow:0 0 25px rgba(0,255,213,0.4);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:25px;
}

.card-content h2{
    margin-bottom:10px;
}

.price{
    color:#00ffd5;
    font-size:24px;
    margin-bottom:20px;
}

.buy-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#00ffd5;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.buy-btn:hover{
    background:white;
}

/* LOGIN */

.login-modal{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.login-box{
    width:350px;
    background:#1b1b1b;
    padding:35px;
    border-radius:25px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
}

.login-box button{
    width:100%;
    padding:14px;
    margin-top:18px;
    border:none;
    border-radius:12px;
    background:#00ffd5;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    background:#111;
    color:gray;
}

/* ANIMATION */

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

    <div class="logo">LUXURY</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#products">Products</a></li>
        <li><a href="#" onclick="openLogin()">Login</a></li>
    </ul>

</nav>

<!-- HERO -->

<section class="hero">

    <h1>Future Shopping</h1>

    <p>Premium Tech & Fashion Collection</p>

    <button onclick="scrollToProducts()">
        Shop Now
    </button>

</section>

<!-- PRODUCTS -->

<section class="products" id="products">

    <h1 class="products-title">
        Featured Products
    </h1>

    <div class="grid">

        <!-- CARD 1 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

            <div class="card-content">

                <h2>iPhone 15 Pro</h2>

                <div class="price">$1299</div>

                <button class="buy-btn"
                onclick="buyNow()">
                    Buy Now
                </button>

            </div>

        </div>

        <!-- CARD 2 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

            <div class="card-content">

                <h2>Nike Sneakers</h2>

                <div class="price">$220</div>

                <button class="buy-btn"
                onclick="buyNow()">
                    Buy Now
                </button>

            </div>

        </div>

        <!-- CARD 3 -->

        <div class="card">

            <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

            <div class="card-content">

                <h2>Gaming Keyboard</h2>

                <div class="price">$89</div>

                <button class="buy-btn"
                onclick="buyNow()">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</section>

<!-- LOGIN -->

<div class="login-modal" id="loginModal">

    <div class="login-box">

        <span class="close"
        onclick="closeLogin()">✖</span>

        <h2>Member Login</h2>

        <input type="text"
        id="username"
        placeholder="Username">

        <input type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

</div>

<!-- FOOTER -->

<footer>
    2026 Luxury Shop
</footer>

<script>

/* LOGIN MODAL */

function openLogin(){

    document.getElementById("loginModal")
    .style.display="flex";

}

function closeLogin(){

    document.getElementById("loginModal")
    .style.display="none";

}

/* LOGIN */

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username==="" || password===""){

        alert("Please fill all fields");

    }else{

        localStorage.setItem("user",username);

        alert("Welcome " + username);

        closeLogin();
    }
}

/* BUY */

function buyNow(){

    let user =
    localStorage.getItem("user");

    if(user==null){

        alert("Please login first");

        openLogin();

    }else{

        window.open(
        "https://www.coupang.com/",
        "_blank"
        );

    }
}

/* SCROLL */

function scrollToProducts(){

    document.getElementById("products")
    .scrollIntoView({
        behavior:"smooth"
    });

}

</script>

</body>
</html>
