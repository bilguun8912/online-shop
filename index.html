<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:#111827;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#38bdf8;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

.hero{
    height:400px;
    background:url('https://images.wallpapersden.com/image/download/valorant-4k-logo_bGVma22UmZqaraWkpJRobWllrWdma2U.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:60px;
    text-shadow:2px 2px 10px black;
}

.hero p{
    margin-top:10px;
    font-size:20px;
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    background:#38bdf8;
    border:none;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
}

.products{
    padding:50px;
}

.products h2{
    text-align:center;
    margin-bottom:40px;
    font-size:40px;
}

.card-container{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:10px;
}

.price{
    color:#38bdf8;
    font-size:22px;
    margin:10px 0;
}

.buy-btn{
    width:100%;
    padding:10px;
    border:none;
    background:#38bdf8;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.buy-btn:hover{
    background:#0ea5e9;
}

.login{
    padding:50px;
    display:flex;
    justify-content:center;
}

.login-box{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    width:350px;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    background:#111827;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <div class="logo">GAME SHOP</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Gaming Store</h1>
    <p>Buy your favorite games instantly</p>
    <button class="btn">Shop Now</button>
</section>

<section class="products">
    <h2>Popular Games</h2>

    <div class="card-container">

        <div class="card">
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/730/header.jpg">
            <div class="card-content">
                <h3>Counter-Strike 2</h3>
                <div class="price">$19.99</div>
                <button class="buy-btn"
                onclick="window.open('https://store.steampowered.com/app/730/CounterStrike_2/')">
                Buy Now
                </button>
            </div>
        </div>

        <div class="card">
            <img src="https://cdn1.epicgames.com/spt-assets/3a212c0da4f1434a8c2d6c2f6a7e6b8f/valorant-1a5gk.jpg">
            <div class="card-content">
                <h3>Valorant</h3>
                <div class="price">Free</div>
                <button class="buy-btn"
                onclick="window.open('https://playvalorant.com/')">
                Play
                </button>
            </div>
        </div>

    </div>
</section>

<section class="login">
    <div class="login-box">
        <h2>Login</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button onclick="alert('Logged in!')">
            Login
        </button>
    </div>
</section>

<footer>
    © 2026 Game Shop Website
</footer>

</body>
</html>
