<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Shop Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px black;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid gray;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

.toggle{
    text-align:center;
    margin-top:15px;
    cursor:pointer;
    color:blue;
}

#welcome{
    display:none;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

    <div id="authBox">

        <h1 id="title">Login</h1>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="submitForm()">Login</button>

        <div class="toggle" onclick="toggleForm()">
            Don't have an account? Sign Up
        </div>

    </div>

    <div id="welcome">
        <h1>Welcome!</h1>
        <p id="welcomeText"></p>

        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>

let isLogin = true;

function toggleForm(){

    isLogin = !isLogin;

    if(isLogin){
        document.getElementById("title").innerText = "Login";
        document.querySelector("button").innerText = "Login";
        document.querySelector(".toggle").innerText =
        "Don't have an account? Sign Up";
    }
    else{
        document.getElementById("title").innerText = "Sign Up";
        document.querySelector("button").innerText = "Sign Up";
        document.querySelector(".toggle").innerText =
        "Already have an account? Login";
    }
}

function submitForm(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "" || password === ""){
        alert("Please fill all fields");
        return;
    }

    if(isLogin){

        let savedUser =
        localStorage.getItem("username");

        let savedPass =
        localStorage.getItem("password");

        if(username === savedUser &&
           password === savedPass){

            showWelcome(username);

        }else{
            alert("Wrong username or password");
        }

    }else{

        localStorage.setItem("username", username);
        localStorage.setItem("password", password);

        alert("Account created!");

        toggleForm();
    }
}

function showWelcome(username){

    document.getElementById("authBox").style.display = "none";

    document.getElementById("welcome").style.display = "block";

    document.getElementById("welcomeText").innerText =
    "Hello, " + username;
}

function logout(){

    document.getElementById("authBox").style.display = "block";

    document.getElementById("welcome").style.display = "none";
}

</script>

</body>
</html>
