<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Shop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
}

/* LOGIN PAGE */

#loginPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#111,#333);
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:20px;
    text-align:center;
}

.login-box h1{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid gray;
}

.login-box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* SHOP PAGE */

#shopPage{
    display:none;
}

header{
    background:black;
    color:white;
    padding:20px;
    text-align:center;
    font-size:30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    padding:40px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 10px gray;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.price{
    color:red;
    font-size:20px;
    margin:10px 0;
}

.buy-btn{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.buy-btn:hover{
    background:black;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

    <div class="login-box">

        <h1>Login</h1>

        <input type="text"
        id="username"
        placeholder="Username">

        <input type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

</div>

<!-- SHOP -->

<div id="shopPage">

<header>
    K-SHOP
</header>

<div class="products">

    <!-- PRODUCT 1 -->

    <div class="card">

        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

        <div class="card-content">

            <h2>iPhone 15</h2>

            <div class="price">$999</div>

            <button class="buy-btn"
            onclick="buyProduct('https://www.coupang.com/')">
                Buy Now
            </button>

        </div>

    </div>

    <!-- PRODUCT 2 -->

    <div class="card">

        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

        <div class="card-content">

            <h2>Nike Shoes</h2>

            <div class="price">$120</div>

            <button class="buy-btn"
            onclick="buyProduct('https://www.coupang.com/')">
                Buy Now
            </button>

        </div>

    </div>

    <!-- PRODUCT 3 -->

    <div class="card">

        <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

        <div class="card-content">

            <h2>Gaming Keyboard</h2>

            <div class="price">$80</div>

            <button class="buy-btn"
            onclick="buyProduct('https://www.coupang.com/')">
                Buy Now
            </button>

        </div>

    </div>

</div>

</div>

<script>

/* LOGIN */

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "" || password === ""){

        alert("Please enter username and password");

    }else{

        localStorage.setItem("user",username);

        document.getElementById("loginPage")
        .style.display="none";

        document.getElementById("shopPage")
        .style.display="block";
    }
}

/* BUY BUTTON */

function buyProduct(link){

    window.open(link,"_blank");

}

</script>

</body>
</html>
